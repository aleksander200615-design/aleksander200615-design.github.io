<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGazer для физиологии</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@3.4/dist/webgazer.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        #status { margin: 8px; font-size: 18px; }
        button { padding: 4px 8px; font-size: 14px; margin: 4px; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; }
        .capture-area {
            border: solid 2px black;
            background-color: skyblue;
            position: fixed;
            opacity: 0;
        }
        img.image-area {
            object-fit: fill;
            position: fixed;
        }
        .calibration-dot {
            width: 16px;
            height: 16px;
            border: solid 2px black;
            background-color: rgb(255, 70, 70);
            border-radius: 100vmax;
            position: absolute;
            z-index: 10000;
        }
        #calibration-area {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .notification-bg {
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.4);
            padding: 16px;
        }
        .notification-panel {
            padding: 30px;
            background-color: white;
            border-radius: 16px;
            border: solid 2px black;
            width: 100%;
            height: 100%;
            max-width: 50em;
            max-height: 30em;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .notification-panel .outer-frame {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }
        .notification-panel .outer-frame .inner-frame {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            text-align: left;
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">
    <div style="display: flex; align-items: center; border-bottom: solid 1px black; padding: 8px">
        <h3>Проект по физиологии: Трекинг взгляда</h3>
        <div id="status" style="flex-grow: 1">Статус: Готов к запуску. Нажми "Запустить"</div>
        <button id="start" onclick="startWebGazer()">Запустить WebGazer</button>
        <button id="pause" onclick="pauseWebGazer()" style="display: none" disabled>Пауза</button>
        <button id="resume" onclick="resumeWebGazer()" style="display: none" disabled>Продолжить</button>
        <button id="end" onclick="window.location.reload();" disabled>Остановить</button>
        <div style="display: flex; flex-direction: column">
            <button id="hide" onclick="hideVideo()" disabled>Спрятать видео</button>
            <button id="show" onclick="showVideo()" disabled>Показать видео</button>
        </div>
        <button id="reset" onclick="resetWebGazer()" style="display: none" disabled>Сбросить</button>
        <button id="consent" onclick="createNotificationConsent();">Согласие</button>
    </div>
    <div id="calibration-area"></div>
    <script src="calibration.js"></script>
    <script src="capture-areas.js"></script>
    <script src="image-areas.js"></script>
    <script src="levels.js"></script>
    <script src="main.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
